<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1440" />
<title>Requra.AI – Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1440px; height: 900px; font-family: 'Courier New', monospace; background: #FAFAFA; display: flex; flex-direction: column; }
  .nav { width: 1440px; height: 64px; background: #1A1A1A; display: flex; align-items: center; justify-content: space-between; padding: 0 80px; flex-shrink: 0; }
  .nav-logo { color: #FFFFFF; font-size: 18px; font-weight: 700; letter-spacing: 0.08em; }
  .main { flex: 1; display: flex; align-items: center; justify-content: center; }
  .card { width: 400px; background: #FFFFFF; border: 1.5px solid #D0D0D0; border-radius: 8px; padding: 40px; }
  .card-logo { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .card-sub { font-size: 11px; color: #999999; text-align: center; margin-bottom: 32px; }
  .field { margin-bottom: 20px; }
  .field-label { font-size: 10px; color: #999999; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .field-input { width: 100%; height: 40px; background: #FFFFFF; border: 1.5px solid #CCCCCC; border-radius: 4px; display: flex; align-items: center; padding: 0 14px; font-size: 12px; color: #AAAAAA; }
  .forgot { text-align: right; margin-bottom: 24px; }
  .forgot span { font-size: 11px; color: #666666; text-decoration: underline; }
  .btn-primary { width: 100%; height: 44px; background: #1A1A1A; color: #FFFFFF; border: none; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; cursor: pointer; }
  .divider { text-align: center; margin: 20px 0; font-size: 11px; color: #CCCCCC; }
  .register-link { text-align: center; font-size: 11px; color: #999999; }
  .register-link span { color: #1A1A1A; text-decoration: underline; }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">REQURA.AI</div>
</nav>
<main class="main">
  <div class="card">
    <div class="card-logo">REQURA.AI</div>
    <div class="card-sub">Sign in to your account</div>

    <div class="field">
      <div class="field-label">Email Address</div>
      <div class="field-input">analyst@company.com</div>
    </div>

    <div class="field">
      <div class="field-label">Password</div>
      <div class="field-input">••••••••••</div>
    </div>

    <div class="forgot"><span>Forgot password?</span></div>

    <button class="btn-primary">Sign In</button>

    <div class="divider">— or —</div>

    <div class="register-link">
      Don't have an account? <span>Register here</span>
    </div>
  </div>
</main>
</body>
</html>
